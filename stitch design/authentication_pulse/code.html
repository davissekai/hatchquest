<!-- Branding Anchor -->

<div class="w-20 h-20 bg-primary rounded-xl mb-6 shadow-[0_12px_40px_rgba(21,5,120,0.2)] flex items-center justify-center">

</div>
<h1 class="font-headline font-black text-4xl text-on-primary-container tracking-tighter italic">HatchQuest</h1>
<p class="font-body italic text-lg text-on-surface-variant mt-2">The Scholarly Soul of the Streets</p>
</div>
<!-- Authentication Card -->
<div class="glass-panel rounded-xl p-10 shadow-[0_12px_40px_rgba(21,5,120,0.08)]">
<div class="mb-8">

<p class="font-body text-on-surface-variant mt-1">Begin your journey through the academic chronicles of Accra.</p>
</div>
<form action="#" class="space-y-6">
<!-- Name Field -->

<div class="relative group">
<span class="material-symbols-outlined absolute left-5 top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-primary transition-colors">person</span>
<input class="w-full pl-14 pr-6 py-4 bg-surface-container-high border-none rounded-xl focus:ring-2 focus:ring-primary/20 text-on-surface font-body text-lg transition-all placeholder:text-outline-variant" id="name" name="name" placeholder="Nana Kwesi" type="text"/>
</div>
</div>
<!-- Email Field -->
<div class="space-y-2">
<label class="font-label text-sm font-semibold text-on-surface-variant ml-4" for="email">Academic Email</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-5 top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-primary transition-colors">alternate_email</span>
<input class="w-full pl-14 pr-6 py-4 bg-surface-container-high border-none rounded-xl focus:ring-2 focus:ring-primary/20 text-on-surface font-body text-lg transition-all placeholder:text-outline-variant" id="email" name="email" placeholder="kwesi@hatchquest.edu" type="email"/>
</div>
</div>

<button class="w-full py-5 bg-primary text-on-primary font-headline font-extrabold text-lg rounded-xl shadow-[0_8px_30px_rgba(82,79,178,0.3)] hover:scale-[1.02] active:scale-95 transition-all duration-200 flex items-center justify-center gap-3" type="submit">
                        Enter the Chronicles
