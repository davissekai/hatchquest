name: CI

on:
  pull_request:
    branches:
      - develop
      - master

jobs:
  ci:
    name: Type Check · Lint · Test · Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm            # caches node_modules between runs — faster CI

      - name: Install dependencies
        run: npm ci             # deterministic install from package-lock.json

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
        env:
          # Build needs these to exist — values are dummies for CI
          # Real secrets live in Supabase and are never committed
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
