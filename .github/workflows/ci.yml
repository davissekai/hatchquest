name: CI

on:
  pull_request:
    branches:
      - develop
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Backend engine — pure TypeScript, no secrets needed
  backend:
    name: Backend · Type Check · Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check (shared)
        run: npm run type-check --workspace=packages/shared

      - name: Type check (backend)
        run: npm run type-check --workspace=backend

      - name: Test (backend)
        run: npm run test --workspace=backend

  # Frontend — Next.js build, needs Supabase env vars
  frontend:
    name: Frontend · Lint · Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (frontend)
        run: npm run lint --workspace=frontend

      - name: Build (frontend)
        run: npm run build --workspace=frontend
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
